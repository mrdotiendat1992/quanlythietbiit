<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Thiết bị</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body id="page-equipments">
    <aside class="sidebar">
        <div class="sidebar-header">🏢 IT System</div>
        <nav class="nav-links">
            <a href="/">📊 Dashboard</a>
            <a href="/departments.html">🏢 Phòng ban</a>
            <a href="/equipments.html" class="active">💻 Thiết bị</a>
            <a href="/logs.html">📝 Lịch sử IT</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Quản lý Thiết bị</h1>
            <button class="btn btn-primary" onclick="openModal('modal-equipment')">+ Thêm thiết bị</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên thiết bị</th>
                        <th>Loại</th>
                        <th>Trạng thái</th>
                        <th>Phòng ban</th>
                        <th>Người dùng</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="equipments-tbody">
                    <!-- Dữ liệu JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Thêm Equipment -->
    <div class="modal-overlay" id="modal-equipment">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Thêm thiết bị mới</h2>
                <button class="close-btn" onclick="closeModal('modal-equipment')">×</button>
            </div>
            <form id="form-equipment">
                <div class="form-group">
                    <label>Tên thiết bị / Mã thiết bị</label>
                    <input type="text" id="eq-name" class="form-control" required placeholder="VD: PC-KT-01, Máy in HP 2035...">
                </div>
                <div class="form-group">
                    <label>Loại thiết bị</label>
                    <select id="eq-type" class="form-control">
                        <option value="Máy tính bàn">Máy tính bàn</option>
                        <option value="Laptop">Laptop</option>
                        <option value="Máy in">Máy in</option>
                        <option value="Thiết bị mạng">Thiết bị mạng</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Trạng thái</label>
                    <select id="eq-status" class="form-control">
                        <option value="Đang sử dụng">Đang sử dụng</option>
                        <option value="Trống (Kho)">Trống (Kho)</option>
                        <option value="Hỏng/Đang sửa">Hỏng/Đang sửa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Phân bổ cho phòng ban</label>
                    <select id="eq-department" class="form-control">
                        <option value="">-- Chưa phân bổ --</option>
                        <!-- Render từ JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Người dùng (Tên NV)</label>
                    <input type="text" id="eq-user" class="form-control" placeholder="Tên user nếu có">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" style="background:#E5E7EB; color:#374151" onclick="closeModal('modal-equipment')">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
