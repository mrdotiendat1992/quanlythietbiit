<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Phòng ban</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body id="page-departments">
    <aside class="sidebar">
        <div class="sidebar-header">🏢 IT System</div>
        <nav class="nav-links">
            <a href="index.html">📊 Dashboard</a>
            <a href="departments.html" class="active">🏢 Phòng ban</a>
            <a href="equipments.html">💻 Thiết bị</a>
            <a href="logs.html">📝 Lịch sử IT</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Quản lý Phòng ban</h1>
            <button class="btn btn-primary" onclick="openDepartmentModal()">+ Thêm phòng ban</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên phòng ban</th>
                        <th>Mô tả</th>
                        <th>Thao tác nhanh</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="departments-tbody"></tbody>
            </table>
        </div>
    </main>

    <div class="modal-overlay" id="modal-department">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="department-modal-title">Thêm phòng ban mới</h2>
                <button class="close-btn" onclick="closeModal('modal-department')">×</button>
            </div>
            <form id="form-department">
                <input type="hidden" id="dept-id" value="">
                <div class="form-group">
                    <label>Tên phòng ban</label>
                    <input type="text" id="dept-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Mô tả (Không bắt buộc)</label>
                    <textarea id="dept-desc" class="form-control" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" style="background:#E5E7EB; color:#374151" onclick="closeModal('modal-department')">Hủy</button>
                    <button type="submit" class="btn btn-primary" id="department-submit-btn">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="static/js/supabase-config.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
